<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Auth</title>
<link href="https://fonts.googleapis.com/css2?family=Bebas+Neue&family=DM+Mono:wght@300;400&family=Syne:wght@400;600&display=swap" rel="stylesheet">
<style>
  *, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }
  :root {
    --bg: #080810; --card: rgba(255,255,255,0.06); --border: rgba(255,255,255,0.13);
    --accent: #a78bfa; --accent2: #67e8f9; --text: rgba(255,255,255,0.92);
    --muted: rgba(255,255,255,0.4); --danger: #f87171; --success: #34d399;
  }
  body { background: var(--bg); font-family: 'Syne', sans-serif; min-height: 100vh; display: flex; align-items: center; justify-content: center; padding: 20px; overflow: hidden; }
  .bg { position: fixed; inset: 0; z-index: 0; background: radial-gradient(ellipse 60% 50% at 20% 30%, rgba(103,232,249,0.11) 0%, transparent 65%), radial-gradient(ellipse 55% 60% at 80% 70%, rgba(167,139,250,0.15) 0%, transparent 65%), #080810; }
  .grain { position: fixed; inset: 0; z-index: 1; opacity: 0.03; pointer-events: none; background-image: url("data:image/svg+xml,%3Csvg viewBox='0 0 200 200' xmlns='http://www.w3.org/2000/svg'%3E%3Cfilter id='n'%3E%3CfeTurbulence type='fractalNoise' baseFrequency='0.9' numOctaves='4' stitchTiles='stitch'/%3E%3C/filter%3E%3Crect width='100%25' height='100%25' filter='url(%23n)'/%3E%3C/svg%3E"); background-size: 150px; }
  .orb { position: fixed; border-radius: 50%; filter: blur(80px); z-index: 0; pointer-events: none; animation: drift 12s ease-in-out infinite alternate; }
  .orb1 { width: 350px; height: 350px; background: rgba(167,139,250,0.11); top: -80px; left: -80px; }
  .orb2 { width: 280px; height: 280px; background: rgba(103,232,249,0.09); bottom: -60px; right: -60px; animation-delay: -5s; }
  @keyframes drift { from { transform: translate(0,0); } to { transform: translate(30px,25px); } }

  .card {
    position: relative; z-index: 10; width: 100%; max-width: 420px;
    background: var(--card); backdrop-filter: blur(28px) saturate(180%); -webkit-backdrop-filter: blur(28px) saturate(180%);
    border: 1px solid var(--border); border-radius: 24px; padding: 40px 36px;
    box-shadow: 0 32px 80px rgba(0,0,0,0.5), 0 1px 0 rgba(255,255,255,0.1) inset;
    animation: floatIn 0.6s cubic-bezier(0.16,1,0.3,1) both;
  }
  @keyframes floatIn { from { opacity:0; transform:translateY(24px) scale(0.97); } to { opacity:1; transform:translateY(0) scale(1); } }

  .logo { font-family: 'Bebas Neue', sans-serif; font-size: 2.4rem; letter-spacing: 0.06em; background: linear-gradient(135deg, #fff 30%, var(--accent)); -webkit-background-clip: text; -webkit-text-fill-color: transparent; background-clip: text; margin-bottom: 6px; }
  .subtitle { font-size: 13px; color: var(--muted); margin-bottom: 32px; }

  .tabs { display: flex; gap: 4px; background: rgba(0,0,0,0.25); padding: 5px; border-radius: 12px; margin-bottom: 28px; }
  .tab-btn { flex: 1; padding: 8px; border-radius: 8px; border: none; background: transparent; color: var(--muted); font-family: 'Syne', sans-serif; font-size: 13px; font-weight: 600; cursor: pointer; transition: all 0.2s; }
  .tab-btn.active { background: rgba(167,139,250,0.2); border: 1px solid rgba(167,139,250,0.35); color: #c4b5fd; }

  .form { display: none; flex-direction: column; gap: 14px; }
  .form.active { display: flex; animation: fadeUp 0.3s ease both; }
  @keyframes fadeUp { from { opacity:0; transform:translateY(8px); } to { opacity:1; transform:translateY(0); } }

  .field { display: flex; flex-direction: column; gap: 6px; }
  .field label { font-family: 'DM Mono', monospace; font-size: 10px; letter-spacing: 0.1em; color: var(--muted); text-transform: uppercase; }
  .field input { padding: 12px 14px; background: rgba(0,0,0,0.3); border: 1px solid rgba(255,255,255,0.1); border-radius: 12px; color: var(--text); font-family: 'DM Mono', monospace; font-size: 14px; outline: none; transition: border-color 0.2s; }
  .field input:focus { border-color: var(--accent); }
  .field input::placeholder { color: rgba(255,255,255,0.2); }

  .submit-btn { margin-top: 6px; padding: 14px; border-radius: 12px; border: none; background: linear-gradient(135deg, rgba(167,139,250,0.6), rgba(103,232,249,0.35)); color: #fff; font-family: 'Syne', sans-serif; font-size: 14px; font-weight: 600; cursor: pointer; transition: all 0.2s; letter-spacing: 0.04em; }
  .submit-btn:hover { opacity: 0.88; transform: translateY(-1px); }
  .submit-btn:disabled { opacity: 0.5; cursor: not-allowed; transform: none; }

  .error-box { padding: 10px 14px; background: rgba(248,113,113,0.12); border: 1px solid rgba(248,113,113,0.3); border-radius: 10px; color: var(--danger); font-family: 'DM Mono', monospace; font-size: 12px; display: none; }
  .error-box.show { display: block; animation: fadeUp 0.2s ease; }
</style>
</head>
<body>
<div class="bg"></div><div class="grain"></div>
<div class="orb orb1"></div><div class="orb orb2"></div>

<div class="card">
  <div class="logo">Welcome</div>
  <p class="subtitle">Sign in or create an account to continue.</p>

  <div class="tabs">
    <button class="tab-btn active" onclick="switchForm('login',this)">Log In</button>
    <button class="tab-btn" onclick="switchForm('signup',this)">Sign Up</button>
  </div>

  <form class="form active" id="form-login" onsubmit="handleLogin(event)">
    <div class="field"><label>Email</label><input type="email" id="login-email" placeholder="you@email.com" required></div>
    <div class="field"><label>Password</label><input type="password" id="login-password" placeholder="••••••••" required></div>
    <div class="error-box" id="login-error"></div>
    <button class="submit-btn" type="submit" id="login-btn">Log In →</button>
  </form>

  <form class="form" id="form-signup" onsubmit="handleSignup(event)">
    <div class="field"><label>Username</label><input type="text" id="signup-username" placeholder="yourname" required></div>
    <div class="field"><label>Email</label><input type="email" id="signup-email" placeholder="you@email.com" required></div>
    <div class="field"><label>Password</label><input type="password" id="signup-password" placeholder="min 6 characters" required></div>
    <div class="error-box" id="signup-error"></div>
    <button class="submit-btn" type="submit" id="signup-btn">Create Account →</button>
  </form>
</div>

<script>
  function switchForm(name, btn) {
    document.querySelectorAll('.form').forEach(f => f.classList.remove('active'));
    document.querySelectorAll('.tab-btn').forEach(b => b.classList.remove('active'));
    document.getElementById('form-' + name).classList.add('active');
    btn.classList.add('active');
  }
  function showError(id, msg) { const el = document.getElementById(id); el.textContent = msg; el.classList.add('show'); }
  function hideError(id) { document.getElementById(id).classList.remove('show'); }

  async function handleLogin(e) {
    e.preventDefault(); hideError('login-error');
    const btn = document.getElementById('login-btn');
    btn.disabled = true; btn.textContent = 'Signing in…';
    const res  = await fetch('/api/login', { method:'POST', headers:{'Content-Type':'application/json'}, body: JSON.stringify({ email: document.getElementById('login-email').value, password: document.getElementById('login-password').value }) });
    const data = await res.json();
    if (data.ok) { window.location.href = '/dashboard'; }
    else { showError('login-error', data.error); btn.disabled = false; btn.textContent = 'Log In →'; }
  }

  async function handleSignup(e) {
    e.preventDefault(); hideError('signup-error');
    const btn = document.getElementById('signup-btn');
    btn.disabled = true; btn.textContent = 'Creating account…';
    const res  = await fetch('/api/signup', { method:'POST', headers:{'Content-Type':'application/json'}, body: JSON.stringify({ username: document.getElementById('signup-username').value, email: document.getElementById('signup-email').value, password: document.getElementById('signup-password').value }) });
    const data = await res.json();
    if (data.ok) { window.location.href = '/dashboard'; }
    else { showError('signup-error', data.error); btn.disabled = false; btn.textContent = 'Create Account →'; }
  }
</script>
</body>
</html>
