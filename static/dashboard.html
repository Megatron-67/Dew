<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Dashboard</title>
<link href="https://fonts.googleapis.com/css2?family=Bebas+Neue&family=DM+Mono:wght@300;400&family=Syne:wght@400;600&display=swap" rel="stylesheet">
<style>
  *, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }
  :root {
    --bg: #080810; --card: rgba(255,255,255,0.05); --border: rgba(255,255,255,0.12);
    --accent: #a78bfa; --accent2: #67e8f9; --text: rgba(255,255,255,0.92);
    --muted: rgba(255,255,255,0.38); --success: #34d399;
  }
  body { background: var(--bg); font-family: 'Syne', sans-serif; color: var(--text); min-height: 100vh; overflow-x: hidden; }
  .bg { position: fixed; inset: 0; z-index: 0; background: radial-gradient(ellipse 65% 50% at 10% 20%, rgba(103,232,249,0.09) 0%, transparent 60%), radial-gradient(ellipse 55% 60% at 90% 80%, rgba(167,139,250,0.12) 0%, transparent 60%), #080810; }
  .grain { position: fixed; inset: 0; z-index: 1; opacity: 0.03; pointer-events: none; background-image: url("data:image/svg+xml,%3Csvg viewBox='0 0 200 200' xmlns='http://www.w3.org/2000/svg'%3E%3Cfilter id='n'%3E%3CfeTurbulence type='fractalNoise' baseFrequency='0.9' numOctaves='4' stitchTiles='stitch'/%3E%3C/filter%3E%3Crect width='100%25' height='100%25' filter='url(%23n)'/%3E%3C/svg%3E"); background-size: 150px; }
  .orb { position: fixed; border-radius: 50%; filter: blur(90px); z-index: 0; pointer-events: none; animation: drift 14s ease-in-out infinite alternate; }
  .orb1 { width: 380px; height: 380px; background: rgba(167,139,250,0.09); top: -80px; left: -80px; }
  .orb2 { width: 300px; height: 300px; background: rgba(103,232,249,0.08); bottom: -60px; right: -60px; animation-delay: -6s; }
  @keyframes drift { from { transform: translate(0,0); } to { transform: translate(35px,28px); } }

  .glass { background: var(--card); backdrop-filter: blur(24px) saturate(180%); -webkit-backdrop-filter: blur(24px) saturate(180%); border: 1px solid var(--border); border-radius: 18px; box-shadow: 0 16px 50px rgba(0,0,0,0.35), 0 1px 0 rgba(255,255,255,0.07) inset; transition: background 0.2s, transform 0.2s; }

  .page { position: relative; z-index: 10; max-width: 1000px; margin: 0 auto; padding: 0 20px 60px; }

  .topbar { display: flex; align-items: center; justify-content: space-between; padding: 20px 0 28px; border-bottom: 1px solid rgba(255,255,255,0.07); margin-bottom: 32px; animation: fadeDown 0.5s ease both; }
  .topbar-logo { font-family: 'Bebas Neue', sans-serif; font-size: 1.6rem; letter-spacing: 0.06em; background: linear-gradient(135deg, #fff 30%, var(--accent)); -webkit-background-clip: text; -webkit-text-fill-color: transparent; background-clip: text; }
  .topbar-right { display: flex; align-items: center; gap: 14px; }
  .user-pill { display: flex; align-items: center; gap: 8px; padding: 7px 14px; border-radius: 50px; background: rgba(255,255,255,0.05); border: 1px solid rgba(255,255,255,0.1); font-family: 'DM Mono', monospace; font-size: 12px; color: var(--muted); }
  .user-dot { width: 8px; height: 8px; border-radius: 50%; background: var(--success); }
  .logout-btn { padding: 7px 16px; border-radius: 50px; border: 1px solid rgba(248,113,113,0.3); background: rgba(248,113,113,0.08); color: #fca5a5; font-family: 'DM Mono', monospace; font-size: 12px; cursor: pointer; transition: all 0.2s; }
  .logout-btn:hover { background: rgba(248,113,113,0.18); }

  .welcome { margin-bottom: 28px; animation: fadeUp 0.5s ease both; }
  .welcome h1 { font-family: 'Bebas Neue', sans-serif; font-size: clamp(2.2rem,7vw,3.5rem); letter-spacing: 0.05em; background: linear-gradient(135deg, #fff 40%, var(--accent)); -webkit-background-clip: text; -webkit-text-fill-color: transparent; background-clip: text; line-height: 1; }
  .welcome p { font-size: 14px; color: var(--muted); margin-top: 6px; }

  .stats { display: grid; grid-template-columns: repeat(auto-fill, minmax(200px,1fr)); gap: 14px; margin-bottom: 24px; }
  .stat-card { padding: 22px 24px; display: flex; flex-direction: column; gap: 6px; animation: fadeUp 0.5s ease both; }
  .stat-label { font-family: 'DM Mono', monospace; font-size: 10px; letter-spacing: 0.1em; text-transform: uppercase; color: var(--muted); }
  .stat-value { font-family: 'Bebas Neue', sans-serif; font-size: 2.4rem; letter-spacing: 0.04em; line-height: 1; }
  .stat-sub   { font-size: 12px; color: var(--muted); }
  .stat-card:nth-child(1) .stat-value { color: #c4b5fd; }
  .stat-card:nth-child(2) .stat-value { color: #67e8f9; }
  .stat-card:nth-child(3) .stat-value { color: #f9a8d4; }

  .grid2 { display: grid; grid-template-columns: 1fr 1fr; gap: 16px; }
  .section { padding: 24px; animation: fadeUp 0.55s ease both; }
  .section-title { font-family: 'DM Mono', monospace; font-size: 10px; letter-spacing: 0.12em; text-transform: uppercase; color: var(--muted); margin-bottom: 16px; padding-bottom: 10px; border-bottom: 1px solid rgba(255,255,255,0.07); }

  .activity-list { display: flex; flex-direction: column; gap: 10px; }
  .activity-item { display: flex; align-items: center; gap: 12px; }
  .activity-dot  { width: 6px; height: 6px; border-radius: 50%; background: var(--accent); flex-shrink: 0; }
  .activity-text { font-size: 13px; color: rgba(255,255,255,0.7); flex: 1; }
  .activity-time { font-family: 'DM Mono', monospace; font-size: 10px; color: var(--muted); }

  .profile-rows { display: flex; flex-direction: column; gap: 12px; }
  .profile-row  { display: flex; justify-content: space-between; align-items: center; padding: 10px 0; border-bottom: 1px solid rgba(255,255,255,0.05); }
  .profile-row:last-child { border: none; }
  .profile-key { font-family: 'DM Mono', monospace; font-size: 11px; color: var(--muted); }
  .profile-val { font-size: 13px; font-weight: 600; color: rgba(255,255,255,0.8); }

  .empty { font-family: 'DM Mono', monospace; font-size: 12px; color: var(--muted); text-align: center; padding: 20px 0; }

  @keyframes fadeUp   { from { opacity:0; transform:translateY(14px); } to { opacity:1; transform:translateY(0); } }
  @keyframes fadeDown { from { opacity:0; transform:translateY(-10px); } to { opacity:1; transform:translateY(0); } }
  @media (max-width: 600px) { .grid2 { grid-template-columns: 1fr; } .page { padding: 0 14px 60px; } }
</style>
</head>
<body>
<div class="bg"></div><div class="grain"></div>
<div class="orb orb1"></div><div class="orb orb2"></div>

<div class="page">
  <div class="topbar">
    <div class="topbar-logo">Dashboard</div>
    <div class="topbar-right">
      <div class="user-pill"><div class="user-dot"></div><span id="nav-username">…</span></div>
      <button class="logout-btn" onclick="logout()">Log out</button>
    </div>
  </div>

  <div class="welcome">
    <h1>Hey, <span id="welcome-name">…</span> 👋</h1>
    <p>Here's what's happening with your account.</p>
  </div>

  <div class="stats">
    <div class="glass stat-card"><span class="stat-label">Member Since</span><span class="stat-value" id="stat-since">—</span><span class="stat-sub">Account age</span></div>
    <div class="glass stat-card"><span class="stat-label">Total Users</span><span class="stat-value" id="stat-users">—</span><span class="stat-sub">On this app</span></div>
    <div class="glass stat-card"><span class="stat-label">Activity</span><span class="stat-value" id="stat-activity">—</span><span class="stat-sub">Recent actions</span></div>
  </div>

  <div class="grid2">
    <div class="glass section">
      <div class="section-title">Recent Activity</div>
      <div class="activity-list" id="activity-list"><div class="empty">Loading…</div></div>
    </div>
    <div class="glass section">
      <div class="section-title">Your Profile</div>
      <div class="profile-rows" id="profile-rows"><div class="empty">Loading…</div></div>
    </div>
  </div>
</div>

<script>
  async function load() {
    const res = await fetch('/api/me');
    if (res.status === 401) { window.location.href = '/'; return; }
    const data = await res.json();
    if (!data.ok) { window.location.href = '/'; return; }

    const { user, activity, totalUsers } = data;
    document.getElementById('welcome-name').textContent  = user.username;
    document.getElementById('nav-username').textContent  = user.username;
    document.getElementById('stat-users').textContent    = totalUsers;
    document.getElementById('stat-activity').textContent = activity.length;
    document.getElementById('stat-since').textContent    =
      new Date(user.created_at).toLocaleDateString('en-US', { month:'short', year:'numeric' });

    const list = document.getElementById('activity-list');
    list.innerHTML = activity.length === 0
      ? '<div class="empty">No activity yet.</div>'
      : activity.map(a => `
          <div class="activity-item">
            <div class="activity-dot"></div>
            <span class="activity-text">${a.action}</span>
            <span class="activity-time">${timeAgo(a.created_at)}</span>
          </div>`).join('');

    document.getElementById('profile-rows').innerHTML = `
      <div class="profile-row"><span class="profile-key">Username</span><span class="profile-val">${user.username}</span></div>
      <div class="profile-row"><span class="profile-key">Email</span><span class="profile-val">${user.email}</span></div>
      <div class="profile-row"><span class="profile-key">User ID</span><span class="profile-val">#${user.id}</span></div>
      <div class="profile-row"><span class="profile-key">Joined</span><span class="profile-val">${new Date(user.created_at).toLocaleDateString()}</span></div>`;
  }

  function timeAgo(dateStr) {
    const diff = Math.floor((Date.now() - new Date(dateStr)) / 1000);
    if (diff < 60) return diff + 's ago';
    if (diff < 3600) return Math.floor(diff/60) + 'm ago';
    if (diff < 86400) return Math.floor(diff/3600) + 'h ago';
    return Math.floor(diff/86400) + 'd ago';
  }

  async function logout() {
    await fetch('/api/logout', { method: 'POST' });
    window.location.href = '/';
  }

  load();
</script>
</body>
</html>
